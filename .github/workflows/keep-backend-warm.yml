name: Keep backend warm

# Render's free tier puts the backend to sleep after 15 minutes idle, and
# waking it back up can take 30-60+ seconds - long enough to drop a
# customer's checkout request. Ping the health endpoint often enough that
# it never gets the chance to go idle in the first place.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -fsS --max-time 60 https://jibli-gu1i.onrender.com/health
